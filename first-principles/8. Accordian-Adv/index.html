<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordian Advanced</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="accordion-container">
        <div class="accordion-item">
            <button class="accordion-header">Section 1: The Basics</button>
            <div class="accordion-content">
                <p>This is the content for section 1. It is hidden by default.</p>
            </div>
        </div>

        <div class="accordion-item">
            <button class="accordion-header">Section 2: Advanced Traversal</button>
            <div class="accordion-content">
                <p>This is the content for section 2. Notice how it sits right below the header.</p>
            </div>
        </div>

        <div class="accordion-item">
            <button class="accordion-header">Section 3: Event Listeners</button>
            <div class="accordion-content">
                <p>This is the final section. Only one section should be visible at a time!</p>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
